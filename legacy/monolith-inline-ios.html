<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Cardinal — Stanford Athletics Attendance</title>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #1a1a1a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
      }
      ::-webkit-scrollbar {
        display: none;
      }
      #__load_err {
        display: none;
        position: fixed;
        bottom: 12px;
        left: 12px;
        right: 12px;
        font:
          12px/1.4 ui-monospace,
          monospace;
        background: #2a1215;
        color: #ff8a80;
        padding: 10px 14px;
        border-radius: 8px;
        z-index: 99999;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="__load_err"></div>
    <script>
      window.addEventListener("error", function (e) {
        var d = document.getElementById("__load_err");
        d.style.display = "block";
        d.textContent =
          (d.textContent ? d.textContent + "\n" : "") + (e.message || e.type);
      });
    </script>
    <script type="text/babel">
      // iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
      // Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
      // Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

      // ─────────────────────────────────────────────────────────────
      // Status bar
      // ─────────────────────────────────────────────────────────────
      function IOSStatusBar({ dark = false, time = "9:41" }) {
        const c = dark ? "#fff" : "#000";
        return (
          <div
            style={{
              display: "flex",
              gap: 154,
              alignItems: "center",
              justifyContent: "center",
              padding: "21px 24px 19px",
              boxSizing: "border-box",
              position: "relative",
              zIndex: 20,
              width: "100%",
            }}
          >
            <div
              style={{
                flex: 1,
                height: 22,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                paddingTop: 1.5,
              }}
            >
              <span
                style={{
                  fontFamily: '-apple-system, "SF Pro", system-ui',
                  fontWeight: 590,
                  fontSize: 17,
                  lineHeight: "22px",
                  color: c,
                }}
              >
                {time}
              </span>
            </div>
            <div
              style={{
                flex: 1,
                height: 22,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                gap: 7,
                paddingTop: 1,
                paddingRight: 1,
              }}
            >
              <svg width="19" height="12" viewBox="0 0 19 12">
                <rect
                  x="0"
                  y="7.5"
                  width="3.2"
                  height="4.5"
                  rx="0.7"
                  fill={c}
                />
                <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c} />
                <rect
                  x="9.6"
                  y="2.5"
                  width="3.2"
                  height="9.5"
                  rx="0.7"
                  fill={c}
                />
                <rect
                  x="14.4"
                  y="0"
                  width="3.2"
                  height="12"
                  rx="0.7"
                  fill={c}
                />
              </svg>
              <svg width="17" height="12" viewBox="0 0 17 12">
                <path
                  d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z"
                  fill={c}
                />
                <path
                  d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z"
                  fill={c}
                />
                <circle cx="8.5" cy="10.5" r="1.5" fill={c} />
              </svg>
              <svg width="27" height="13" viewBox="0 0 27 13">
                <rect
                  x="0.5"
                  y="0.5"
                  width="23"
                  height="12"
                  rx="3.5"
                  stroke={c}
                  strokeOpacity="0.35"
                  fill="none"
                />
                <rect x="2" y="2" width="20" height="9" rx="2" fill={c} />
                <path
                  d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z"
                  fill={c}
                  fillOpacity="0.4"
                />
              </svg>
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // Liquid glass pill — blur + tint + shine
      // ─────────────────────────────────────────────────────────────
      function IOSGlassPill({ children, dark = false, style = {} }) {
        return (
          <div
            style={{
              height: 44,
              minWidth: 44,
              borderRadius: 9999,
              position: "relative",
              overflow: "hidden",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              boxShadow: dark
                ? "0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)"
                : "0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)",
              ...style,
            }}
          >
            {/* blur + tint */}
            <div
              style={{
                position: "absolute",
                inset: 0,
                borderRadius: 9999,
                backdropFilter: "blur(12px) saturate(180%)",
                WebkitBackdropFilter: "blur(12px) saturate(180%)",
                background: dark
                  ? "rgba(120,120,128,0.28)"
                  : "rgba(255,255,255,0.5)",
              }}
            />
            {/* shine */}
            <div
              style={{
                position: "absolute",
                inset: 0,
                borderRadius: 9999,
                boxShadow: dark
                  ? "inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)"
                  : "inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)",
                border: dark
                  ? "0.5px solid rgba(255,255,255,0.15)"
                  : "0.5px solid rgba(0,0,0,0.06)",
              }}
            />
            <div
              style={{
                position: "relative",
                zIndex: 1,
                display: "flex",
                alignItems: "center",
                padding: "0 4px",
              }}
            >
              {children}
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // Navigation bar — glass pills + large title
      // ─────────────────────────────────────────────────────────────
      function IOSNavBar({
        title = "Title",
        dark = false,
        trailingIcon = true,
      }) {
        const muted = dark ? "rgba(255,255,255,0.6)" : "#404040";
        const text = dark ? "#fff" : "#000";
        const pillIcon = (content) => (
          <IOSGlassPill dark={dark}>
            <div
              style={{
                width: 36,
                height: 36,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
              }}
            >
              {content}
            </div>
          </IOSGlassPill>
        );
        return (
          <div
            style={{
              display: "flex",
              flexDirection: "column",
              gap: 10,
              paddingTop: 62,
              paddingBottom: 10,
              position: "relative",
              zIndex: 5,
            }}
          >
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                padding: "0 16px",
              }}
            >
              {/* back chevron */}
              {pillIcon(
                <svg
                  width="12"
                  height="20"
                  viewBox="0 0 12 20"
                  fill="none"
                  style={{ marginLeft: -1 }}
                >
                  <path
                    d="M10 2L2 10l8 8"
                    stroke={muted}
                    strokeWidth="2.5"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                  />
                </svg>,
              )}
              {/* trailing ellipsis */}
              {trailingIcon &&
                pillIcon(
                  <svg width="22" height="6" viewBox="0 0 22 6">
                    <circle cx="3" cy="3" r="2.5" fill={muted} />
                    <circle cx="11" cy="3" r="2.5" fill={muted} />
                    <circle cx="19" cy="3" r="2.5" fill={muted} />
                  </svg>,
                )}
            </div>
            {/* large title */}
            <div
              style={{
                padding: "0 16px",
                fontFamily: "-apple-system, system-ui",
                fontSize: 34,
                fontWeight: 700,
                lineHeight: "41px",
                color: text,
                letterSpacing: 0.4,
              }}
            >
              {title}
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // Grouped list (inset card, r:26) + row (52px)
      // ─────────────────────────────────────────────────────────────
      function IOSListRow({
        title,
        detail,
        icon,
        chevron = true,
        isLast = false,
        dark = false,
      }) {
        const text = dark ? "#fff" : "#000";
        const sec = dark ? "rgba(235,235,245,0.6)" : "rgba(60,60,67,0.6)";
        const ter = dark ? "rgba(235,235,245,0.3)" : "rgba(60,60,67,0.3)";
        const sep = dark ? "rgba(84,84,88,0.65)" : "rgba(60,60,67,0.12)";
        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              minHeight: 52,
              padding: "0 16px",
              position: "relative",
              fontFamily: "-apple-system, system-ui",
              fontSize: 17,
              letterSpacing: -0.43,
            }}
          >
            {icon && (
              <div
                style={{
                  width: 30,
                  height: 30,
                  borderRadius: 7,
                  background: icon,
                  marginRight: 12,
                  flexShrink: 0,
                }}
              />
            )}
            <div style={{ flex: 1, color: text }}>{title}</div>
            {detail && (
              <span style={{ color: sec, marginRight: 6 }}>{detail}</span>
            )}
            {chevron && (
              <svg
                width="8"
                height="14"
                viewBox="0 0 8 14"
                style={{ flexShrink: 0 }}
              >
                <path
                  d="M1 1l6 6-6 6"
                  stroke={ter}
                  strokeWidth="2"
                  fill="none"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                />
              </svg>
            )}
            {!isLast && (
              <div
                style={{
                  position: "absolute",
                  bottom: 0,
                  right: 0,
                  left: icon ? 58 : 16,
                  height: 0.5,
                  background: sep,
                }}
              />
            )}
          </div>
        );
      }

      function IOSList({ header, children, dark = false }) {
        const hc = dark ? "rgba(235,235,245,0.6)" : "rgba(60,60,67,0.6)";
        const bg = dark ? "#1C1C1E" : "#fff";
        return (
          <div>
            {header && (
              <div
                style={{
                  fontFamily: "-apple-system, system-ui",
                  fontSize: 13,
                  color: hc,
                  textTransform: "uppercase",
                  padding: "8px 36px 6px",
                  letterSpacing: -0.08,
                }}
              >
                {header}
              </div>
            )}
            <div
              style={{
                background: bg,
                borderRadius: 26,
                margin: "0 16px",
                overflow: "hidden",
              }}
            >
              {children}
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // Device frame
      // ─────────────────────────────────────────────────────────────
      function IOSDevice({
        children,
        width = 402,
        height = 874,
        dark = false,
        title,
        keyboard = false,
      }) {
        return (
          <div
            style={{
              width,
              height,
              borderRadius: 48,
              overflow: "hidden",
              position: "relative",
              background: dark ? "#000" : "#F2F2F7",
              boxShadow:
                "0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)",
              fontFamily: "-apple-system, system-ui, sans-serif",
              WebkitFontSmoothing: "antialiased",
            }}
          >
            {/* dynamic island */}
            <div
              style={{
                position: "absolute",
                top: 11,
                left: "50%",
                transform: "translateX(-50%)",
                width: 126,
                height: 37,
                borderRadius: 24,
                background: "#000",
                zIndex: 50,
              }}
            />
            {/* status bar (absolute) */}
            <div
              style={{
                position: "absolute",
                top: 0,
                left: 0,
                right: 0,
                zIndex: 10,
              }}
            >
              <IOSStatusBar dark={dark} />
            </div>
            {/* nav + content */}
            <div
              style={{
                height: "100%",
                display: "flex",
                flexDirection: "column",
              }}
            >
              {title !== undefined && <IOSNavBar title={title} dark={dark} />}
              <div style={{ flex: 1, overflow: "auto" }}>{children}</div>
              {keyboard && <IOSKeyboard dark={dark} />}
            </div>
            {/* home indicator — always on top */}
            <div
              style={{
                position: "absolute",
                bottom: 0,
                left: 0,
                right: 0,
                zIndex: 60,
                height: 34,
                display: "flex",
                justifyContent: "center",
                alignItems: "flex-end",
                paddingBottom: 8,
                pointerEvents: "none",
              }}
            >
              <div
                style={{
                  width: 139,
                  height: 5,
                  borderRadius: 100,
                  background: dark
                    ? "rgba(255,255,255,0.7)"
                    : "rgba(0,0,0,0.25)",
                }}
              />
            </div>
          </div>
        );
      }

      // ─────────────────────────────────────────────────────────────
      // Keyboard — iOS 26 liquid glass
      // ─────────────────────────────────────────────────────────────
      function IOSKeyboard({ dark = false }) {
        const glyph = dark ? "rgba(255,255,255,0.7)" : "#595959";
        const sugg = dark ? "rgba(255,255,255,0.6)" : "#333";
        const keyBg = dark
          ? "rgba(255,255,255,0.22)"
          : "rgba(255,255,255,0.85)";

        // special-key icons
        const icons = {
          shift: (
            <svg width="19" height="17" viewBox="0 0 19 17">
              <path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph} />
            </svg>
          ),
          del: (
            <svg width="23" height="17" viewBox="0 0 23 17">
              <path
                d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z"
                fill="none"
                stroke={glyph}
                strokeWidth="1.6"
                strokeLinejoin="round"
              />
              <path
                d="M10 5l7 7M17 5l-7 7"
                stroke={glyph}
                strokeWidth="1.6"
                strokeLinecap="round"
              />
            </svg>
          ),
          ret: (
            <svg width="20" height="14" viewBox="0 0 20 14">
              <path
                d="M18 1v6H4m0 0l4-4M4 7l4 4"
                fill="none"
                stroke="#fff"
                strokeWidth="1.8"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
          ),
        };

        const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
          <div
            key={k}
            style={{
              height: 42,
              borderRadius: 8.5,
              flex: flex ? 1 : undefined,
              width: w,
              minWidth: 0,
              background: ret ? "#08f" : keyBg,
              boxShadow: "0 1px 0 rgba(0,0,0,0.075)",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              fontFamily: '-apple-system, "SF Compact", system-ui',
              fontSize: fs,
              fontWeight: 458,
              color: ret ? "#fff" : glyph,
            }}
          >
            {content}
          </div>
        );

        const row = (keys, pad = 0) => (
          <div
            style={{
              display: "flex",
              gap: 6.5,
              justifyContent: "center",
              padding: `0 ${pad}px`,
            }}
          >
            {keys.map((l) => key(l, { flex: true, k: l }))}
          </div>
        );

        return (
          <div
            style={{
              position: "relative",
              zIndex: 15,
              borderRadius: 27,
              overflow: "hidden",
              padding: "11px 0 2px",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              boxShadow: dark
                ? "0 -2px 20px rgba(0,0,0,0.09)"
                : "0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)",
            }}
          >
            {/* liquid glass bg — same recipe as nav pills */}
            <div
              style={{
                position: "absolute",
                inset: 0,
                borderRadius: 27,
                backdropFilter: "blur(12px) saturate(180%)",
                WebkitBackdropFilter: "blur(12px) saturate(180%)",
                background: dark
                  ? "rgba(120,120,128,0.14)"
                  : "rgba(255,255,255,0.25)",
              }}
            />
            <div
              style={{
                position: "absolute",
                inset: 0,
                borderRadius: 27,
                boxShadow: dark
                  ? "inset 1.5px 1.5px 1px rgba(255,255,255,0.15)"
                  : "inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)",
                border: dark
                  ? "0.5px solid rgba(255,255,255,0.15)"
                  : "0.5px solid rgba(0,0,0,0.06)",
                pointerEvents: "none",
              }}
            />

            {/* autocorrect bar */}
            <div
              style={{
                display: "flex",
                gap: 20,
                alignItems: "center",
                padding: "8px 22px 13px",
                width: "100%",
                boxSizing: "border-box",
                position: "relative",
              }}
            >
              {['"The"', "the", "to"].map((w, i) => (
                <React.Fragment key={i}>
                  {i > 0 && (
                    <div
                      style={{
                        width: 1,
                        height: 25,
                        background: "#ccc",
                        opacity: 0.3,
                      }}
                    />
                  )}
                  <div
                    style={{
                      flex: 1,
                      textAlign: "center",
                      fontFamily: "-apple-system, system-ui",
                      fontSize: 17,
                      color: sugg,
                      letterSpacing: -0.43,
                      lineHeight: "22px",
                    }}
                  >
                    {w}
                  </div>
                </React.Fragment>
              ))}
            </div>

            {/* key layout */}
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                gap: 13,
                padding: "0 6.5px",
                width: "100%",
                boxSizing: "border-box",
                position: "relative",
              }}
            >
              {row(["q", "w", "e", "r", "t", "y", "u", "i", "o", "p"])}
              {row(["a", "s", "d", "f", "g", "h", "j", "k", "l"], 20)}
              <div
                style={{ display: "flex", gap: 14.25, alignItems: "center" }}
              >
                {key(icons.shift, { w: 45, k: "shift" })}
                <div style={{ display: "flex", gap: 6.5, flex: 1 }}>
                  {["z", "x", "c", "v", "b", "n", "m"].map((l) =>
                    key(l, { flex: true, k: l }),
                  )}
                </div>
                {key(icons.del, { w: 45, k: "del" })}
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {key("ABC", { w: 92.25, fs: 18, k: "abc" })}
                {key("", { flex: true, k: "space" })}
                {key(icons.ret, { w: 92.25, ret: true, k: "ret" })}
              </div>
            </div>

            {/* bottom spacer (emoji+mic area, icons omitted) */}
            <div style={{ height: 56, width: "100%", position: "relative" }} />
          </div>
        );
      }

      Object.assign(window, {
        IOSDevice,
        IOSStatusBar,
        IOSNavBar,
        IOSGlassPill,
        IOSList,
        IOSListRow,
        IOSKeyboard,
      });
    </script>

                <button
                  key={g.id}
                  onClick={() => updateMsg(i)}
                  style={{
                    background: selectedGame === i ? CARDINAL_LIGHT : "#fff",
                    border:
                      selectedGame === i
                        ? `1.5px solid ${CARDINAL}55`
                        : "1.5px solid #F0F0F0",
                    borderRadius: 12,
                    padding: "10px 14px",
                    cursor: "pointer",
                    display: "flex",
                    alignItems: "center",
                    gap: 10,
                    textAlign: "left",
                    transition: "all 0.15s",
                  }}
                >
                  <span style={{ fontSize: 18 }}>{g.icon}</span>
                  <div style={{ flex: 1 }}>
                    <p
                      style={{
                        fontSize: 13,
                        fontWeight: 700,
                        color: selectedGame === i ? CARDINAL : "#1A1A1A",
                      }}
                    >
                      {g.sport} {g.opponent}
                    </p>
                    <p style={{ fontSize: 11, color: "#AAA" }}>
                      {g.date} · {g.time}
                    </p>
                  </div>
                  <div
                    style={{
                      width: 20,
                      height: 20,
                      borderRadius: 10,
                      border: `2px solid ${selectedGame === i ? CARDINAL : "#DDD"}`,
                      background: selectedGame === i ? CARDINAL : "transparent",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      flexShrink: 0,
                    }}
                  >
                    {selectedGame === i && (
                      <div
                        style={{
                          width: 8,
                          height: 8,
                          borderRadius: 4,
                          background: "#fff",
                        }}
                      />
                    )}
                  </div>
                </button>
              ))}
            </div>

            {/* Message editor */}
            <p
              style={{
                fontSize: 11,
                fontWeight: 700,
                color: "#AAA",
                textTransform: "uppercase",
                letterSpacing: 0.5,
                marginBottom: 8,
              }}
            >
              Message
            </p>
            <textarea
              value={msg}
              onChange={(e) => {
                setMsg(e.target.value);
                setSent(false);
              }}
              rows={6}
              style={{
                width: "100%",
                padding: "13px",
                borderRadius: 13,
                border: "1.5px solid #E8E8E8",
                fontSize: 14,
                color: "#1A1A1A",
                fontFamily: "Inter, sans-serif",
                lineHeight: "20px",
                outline: "none",
                resize: "none",
                background: "#fff",
                boxSizing: "border-box",
                marginBottom: 8,
              }}
            />
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                marginBottom: 16,
              }}
            >
              <span style={{ fontSize: 11, color: "#BBB" }}>
                {msg.length} characters
              </span>
              <button
                onClick={() => setMsg(defaultMsg)}
                style={{
                  background: "none",
                  border: "none",
                  fontSize: 12,
                  color: "#AAA",
                  cursor: "pointer",
                  fontFamily: "Inter, sans-serif",
                }}
              >
                ↺ Reset to default
              </button>
            </div>

            {/* Preview bubble */}
            <div
              style={{
                background: "#F0F0F0",
                borderRadius: 16,
                borderBottomLeftRadius: 4,
                padding: "12px 14px",
                marginBottom: 16,
              }}
            >
              <p
                style={{
                  fontSize: 12,
                  color: "#888",
                  marginBottom: 4,
                  fontWeight: 600,
                }}
              >
                Preview — how it appears to residents
              </p>
              <p style={{ fontSize: 13, color: "#1A1A1A", lineHeight: "19px" }}>
                {msg}
              </p>
            </div>

            {/* Recipients count */}
            <div
              style={{
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                background: "#fff",
                borderRadius: 12,
                padding: "11px 14px",
                border: "1px solid #F0F0F0",
                marginBottom: 12,
                boxShadow: "0 1px 6px rgba(0,0,0,0.04)",
              }}
            >
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ display: "flex" }}>
                  {RA_RESIDENTS.slice(0, 4).map((r, i) => (
                    <div
                      key={i}
                      style={{
                        width: 26,
                        height: 26,
                        borderRadius: 13,
                        background: r.color,
                        border: "2px solid #fff",
                        marginLeft: i === 0 ? 0 : -8,
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        fontSize: 9,
                        fontWeight: 700,
                        color: "#fff",
                      }}
                    >
                      {r.initials}
                    </div>
                  ))}
                </div>
                <span style={{ fontSize: 13, color: "#555", fontWeight: 500 }}>
                  Sending to <strong>{RA_RESIDENTS.length} residents</strong>
                </span>
              </div>
              <span style={{ fontSize: 12, color: "#BBB" }}>
                via push + SMS
              </span>
            </div>

            {/* Send button */}
            <button
              onClick={() => setSent(true)}
              style={{
                width: "100%",
                padding: "15px",
                background: sent ? "#22C55E" : CARDINAL,
                color: "#fff",
                borderRadius: 13,
                border: "none",
                fontSize: 16,
                fontWeight: 800,
                cursor: "pointer",
                transition: "background 0.3s",
                boxShadow: sent
                  ? "0 4px 14px rgba(34,197,94,0.4)"
                  : `0 4px 14px ${CARDINAL}44`,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                gap: 8,
              }}
            >
              {sent ? (
                <>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M5 12l5 5L19 7"
                      stroke="#fff"
                      strokeWidth="2.5"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    />
                  </svg>{" "}
                  Sent to {RA_RESIDENTS.length} Residents!
                </>
              ) : (
                <>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
                      stroke="#fff"
                      strokeWidth="2"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    />
                  </svg>{" "}
                  Send to Floor
                </>
              )}
            </button>
          </div>
        );
      }

      // ── RA Shell ──────────────────────────────────────────────────
      function RAShell({ onExit, tweaks }) {
        const [raTab, setRaTab] = React.useState("dashboard");
        const tabs = [
          { id: "dashboard", label: "Dorm Dashboard" },
          { id: "residents", label: "Residents" },
          { id: "rally", label: "Rally Floor" },
        ];

        return (
          <div
            style={{
              height: "100%",
              display: "flex",
              flexDirection: "column",
              background: "#FAFAFA",
            }}
          >
            {/* RA header — deep green-tinted dark */}
            <div
              style={{
                background: "#0F2A1A",
                paddingTop: 58,
                paddingLeft: 16,
                paddingRight: 16,
                paddingBottom: 0,
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  marginBottom: 14,
                }}
              >
                <div>
                  <div
                    style={{ display: "flex", alignItems: "center", gap: 8 }}
                  >
                    <div
                      style={{
                        width: 8,
                        height: 8,
                        borderRadius: 4,
                        background: "#4ADE80",
                      }}
                    />
                    <p
                      style={{
                        color: "rgba(255,255,255,0.5)",
                        fontSize: 11,
                        fontWeight: 700,
                        textTransform: "uppercase",
                        letterSpacing: 1,
                      }}
                    >
                      RA Dashboard
                    </p>
                  </div>
                  <p
                    style={{
                      color: "#fff",
                      fontSize: 20,
                      fontWeight: 800,
                      marginTop: 2,
                    }}
                  >
                    {tweaks.dormName}
                  </p>
                </div>
                <button
                  onClick={onExit}
                  style={{
                    background: "rgba(255,255,255,0.08)",
                    border: "1px solid rgba(255,255,255,0.15)",
                    borderRadius: 10,
                    padding: "7px 12px",
                    color: "rgba(255,255,255,0.7)",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer",
                    display: "flex",
                    alignItems: "center",
                    gap: 5,
                  }}
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M19 12H5M12 5l-7 7 7 7"
                      stroke="rgba(255,255,255,0.7)"
                      strokeWidth="2.5"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    />
                  </svg>
                  Exit
                </button>
              </div>
              {/* Top nav tabs */}
              <div
                style={{
                  display: "flex",
                  borderBottom: "1px solid rgba(255,255,255,0.08)",
                }}
              >
                {tabs.map((t) => (
                  <button
                    key={t.id}
                    onClick={() => setRaTab(t.id)}
                    style={{
                      flex: 1,
                      padding: "10px 4px",
                      background: "none",
                      border: "none",
                      cursor: "pointer",
                      fontSize: 11,
                      fontWeight: raTab === t.id ? 700 : 400,
                      color: raTab === t.id ? "#fff" : "rgba(255,255,255,0.4)",
                      borderBottom:
                        raTab === t.id
                          ? "2px solid #4ADE80"
                          : "2px solid transparent",
                      transition: "all 0.15s",
                      marginBottom: -1,
                    }}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
              <div style={{ height: 14 }} />
            </div>

            {raTab === "dashboard" && <RADormDashboard tweaks={tweaks} />}
            {raTab === "residents" && <RAResidentBreakdown />}
            {raTab === "rally" && <RARallyScreen tweaks={tweaks} />}
          </div>
        );
      }

      // ── Admin Shell ───────────────────────────────────────────────
      function AdminShell({ onExit }) {
        const [adminTab, setAdminTab] = React.useState("register");
        const [events, setEvents] = React.useState(ADMIN_EVENTS_SEED);

        const handlePublish = (newEvent) => {
          setEvents((prev) => [...prev, newEvent]);
          setTimeout(() => setAdminTab("dashboard"), 1800);
        };

        const tabs = [
          { id: "register", label: "Register Event" },
          { id: "dashboard", label: "Dashboard" },
          { id: "secret", label: "Secret Word" },
        ];

        return (
          <div
            style={{
              height: "100%",
              display: "flex",
              flexDirection: "column",
              background: "#FAFAFA",
            }}
          >
            {/* Admin header */}
            <div
              style={{
                background: "#1A1A1A",
                paddingTop: 58,
                paddingLeft: 16,
                paddingRight: 16,
                paddingBottom: 0,
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  marginBottom: 14,
                }}
              >
                <div>
                  <div
                    style={{ display: "flex", alignItems: "center", gap: 8 }}
                  >
                    <div
                      style={{
                        width: 8,
                        height: 8,
                        borderRadius: 4,
                        background: CARDINAL,
                      }}
                    />
                    <p
                      style={{
                        color: "rgba(255,255,255,0.5)",
                        fontSize: 11,
                        fontWeight: 700,
                        textTransform: "uppercase",
                        letterSpacing: 1,
                      }}
                    >
                      DAPER Admin
                    </p>
                  </div>
                  <p
                    style={{
                      color: "#fff",
                      fontSize: 20,
                      fontWeight: 800,
                      marginTop: 2,
                    }}
                  >
                    Event Manager
                  </p>
                </div>
                <button
                  onClick={onExit}
                  style={{
                    background: "rgba(255,255,255,0.1)",
                    border: "1px solid rgba(255,255,255,0.15)",
                    borderRadius: 10,
                    padding: "7px 12px",
                    color: "rgba(255,255,255,0.7)",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer",
                    display: "flex",
                    alignItems: "center",
                    gap: 5,
                  }}
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M19 12H5M12 5l-7 7 7 7"
                      stroke="rgba(255,255,255,0.7)"
                      strokeWidth="2.5"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    />
                  </svg>
                  Exit Admin
                </button>
              </div>

              {/* Top nav tabs */}
              <div
                style={{
                  display: "flex",
                  gap: 0,
                  borderBottom: "1px solid rgba(255,255,255,0.08)",
                }}
              >
                {tabs.map((t) => (
                  <button
                    key={t.id}
                    onClick={() => setAdminTab(t.id)}
                    style={{
                      flex: 1,
                      padding: "10px 4px",
                      background: "none",
                      border: "none",
                      cursor: "pointer",
                      fontSize: 11,
                      fontWeight: adminTab === t.id ? 700 : 400,
                      color:
                        adminTab === t.id ? "#fff" : "rgba(255,255,255,0.45)",
                      borderBottom:
                        adminTab === t.id
                          ? `2px solid ${CARDINAL}`
                          : "2px solid transparent",
                      transition: "all 0.15s",
                      marginBottom: -1,
                    }}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Screen content */}
            {adminTab === "register" && (
              <AdminRegisterScreen onPublish={handlePublish} />
            )}
            {adminTab === "dashboard" && (
              <AdminDashboardScreen events={events} />
            )}
            {adminTab === "secret" && <AdminSecretWordScreen events={events} />}
          </div>
        );
      }

      // ── App Shell ─────────────────────────────────────────────────
      function App() {
        const [activeTab, setActiveTab] = React.useState("home");
        const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
        const [showTweaks, setShowTweaks] = React.useState(false);
        const [role, setRole] = React.useState("student");
        const [studentScreen, setStudentScreen] = React.useState("onboarding"); // onboarding | main | checkin | photo
        const unreadNotifs = REMINDERS_DATA.filter((r) => !r.read).length;

        React.useEffect(() => {
          const handler = (e) => {
            if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
            if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
          };
          window.addEventListener("message", handler);
          window.parent.postMessage({ type: "__edit_mode_available" }, "*");
          return () => window.removeEventListener("message", handler);
        }, []);

        const setTweak = (key, value) => {
          const updates = typeof key === "object" ? key : { [key]: value };
          setTweaks((prev) => ({ ...prev, ...updates }));
          window.parent.postMessage(
            { type: "__edit_mode_set_keys", edits: updates },
            "*",
          );
        };

        // When role switcher changes to student, reset to main (skip onboarding)
        const handleRoleChange = (r) => {
          setRole(r);
          if (r === "student" && studentScreen === "onboarding")
            setStudentScreen("main");
        };

        const mainScreens = {
          home: HomeScreen,
          leaderboard: LeaderboardScreen,
          games: GamesScreen,
          social: SocialScreen,
          profile: ProfileScreen,
        };
        const MainScreen = mainScreens[activeTab] || HomeScreen;

        const renderStudent = () => {
          if (studentScreen === "onboarding")
            return (
              <OnboardingScreen onComplete={() => setStudentScreen("main")} />
            );
          if (studentScreen === "checkin")
            return (
              <CheckInScreen
                tweaks={tweaks}
                onSuccess={() => setStudentScreen("photo")}
              />
            );
          if (studentScreen === "photo")
            return (
              <PhotoUploadScreen
                tweaks={tweaks}
                onDone={() => setStudentScreen("main")}
              />
            );
          return (
            <>
              <MainScreen
                tweaks={tweaks}
                onCheckIn={() => setStudentScreen("checkin")}
              />
              <BottomNav
                active={activeTab}
                setActive={setActiveTab}
                notifCount={activeTab !== "social" ? unreadNotifs : 0}
              />
            </>
          );
        };

        return (
          <div
            style={{
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              minHeight: "100vh",
              padding: "20px 20px 80px",
              gap: 20,
              flexWrap: "wrap",
            }}
          >
            <IOSDevice width={390} height={844}>
              <div
                style={{
                  position: "relative",
                  height: "100%",
                  overflow: "hidden",
                }}
              >
                {role === "admin" ? (
                  <AdminShell onExit={() => setRole("student")} />
                ) : role === "ra" ? (
                  <RAShell onExit={() => setRole("student")} tweaks={tweaks} />
                ) : (
                  renderStudent()
                )}
              </div>
            </IOSDevice>

            {/* Role switcher pill — outside the phone, hidden during onboarding */}
            {studentScreen !== "onboarding" && (
              <div
                style={{
                  position: "fixed",
                  bottom: 20,
                  left: "50%",
                  transform: "translateX(-50%)",
                  background: "rgba(20,20,20,0.92)",
                  backdropFilter: "blur(16px)",
                  borderRadius: 999,
                  padding: "5px",
                  display: "flex",
                  gap: 2,
                  zIndex: 10000,
                  boxShadow: "0 4px 24px rgba(0,0,0,0.35)",
                  fontFamily: "Inter, sans-serif",
                  border: "1px solid rgba(255,255,255,0.1)",
                }}
              >
                {[
                  { id: "student", label: "🎓 Student" },
                  { id: "ra", label: "🏠 RA View" },
                  { id: "admin", label: "⚙️ Admin" },
                ].map((r) => (
                  <button
                    key={r.id}
                    onClick={() => handleRoleChange(r.id)}
                    style={{
                      padding: "9px 16px",
                      borderRadius: 999,
                      background:
                        role === r.id
                          ? r.id === "admin"
                            ? "#1A1A1A"
                            : r.id === "ra"
                              ? "#0F2A1A"
                              : CARDINAL
                          : "transparent",
                      color: role === r.id ? "#fff" : "rgba(255,255,255,0.45)",
                      border: "none",
                      cursor: "pointer",
                      fontSize: 12,
                      fontWeight: role === r.id ? 700 : 500,
                      transition: "all 0.2s",
                      whiteSpace: "nowrap",
                    }}
                  >
                    {r.label}
                  </button>
                ))}
              </div>
            )}

            {/* Tweaks Panel */}
            {showTweaks && (
              <div
                style={{
                  position: "fixed",
                  bottom: 24,
                  right: 24,
                  zIndex: 9999,
                  background: "#fff",
                  borderRadius: 20,
                  boxShadow: "0 8px 40px rgba(0,0,0,0.18)",
                  padding: "20px",
                  width: 280,
                  border: "1px solid rgba(0,0,0,0.08)",
                  fontFamily: "Inter, sans-serif",
                }}
              >
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    marginBottom: 16,
                  }}
                >
                  <span
                    style={{ fontWeight: 700, fontSize: 15, color: "#1A1A1A" }}
                  >
                    Tweaks
                  </span>
                  <button
                    onClick={() => {
                      setShowTweaks(false);
                      window.parent.postMessage(
                        { type: "__edit_mode_dismissed" },
                        "*",
                      );
                    }}
                    style={{
                      background: "none",
                      border: "none",
                      cursor: "pointer",
                      fontSize: 18,
                      color: "#999",
                    }}
                  >
                    ✕
                  </button>
                </div>

                {[
                  { label: "Dorm Name", key: "dormName", type: "text" },
                  {
                    label: "Dorm Rank",
                    key: "dormRank",
                    type: "number",
                    min: 1,
                    max: 8,
                  },
                  { label: "Your Name", key: "userName", type: "text" },
                  {
                    label: "Games Attended",
                    key: "gamesAttended",
                    type: "number",
                    min: 0,
                    max: 50,
                  },
                  {
                    label: "Streak (games)",
                    key: "currentStreak",
                    type: "number",
                    min: 0,
                    max: 20,
                  },
                  {
                    label: "Total Points",
                    key: "totalPoints",
                    type: "number",
                    min: 0,
                    max: 9999,
                  },
                ].map((field) => (
                  <div key={field.key} style={{ marginBottom: 12 }}>
                    <label
                      style={{
                        display: "block",
                        fontSize: 11,
                        fontWeight: 600,
                        color: "#888",
                        marginBottom: 4,
                        textTransform: "uppercase",
                        letterSpacing: 0.4,
                      }}
                    >
                      {field.label}
                    </label>
                    <input
                      type={field.type}
                      min={field.min}
                      max={field.max}
                      value={tweaks[field.key]}
                      onChange={(e) =>
                        setTweak(
                          field.key,
                          field.type === "number"
                            ? Number(e.target.value)
                            : e.target.value,
                        )
                      }
                      style={{
                        width: "100%",
                        padding: "8px 10px",
                        borderRadius: 8,
                        border: "1.5px solid #EEE",
                        fontSize: 14,
                        color: "#1A1A1A",
                        fontFamily: "Inter, sans-serif",
                        outline: "none",
                      }}
                    />
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
