function LeaderboardRow({ dorm, isLast }) {
  const rankColor = dorm.rank === 1 ? '#FFD700' : dorm.rank === 2 ? '#C0C0C0' : dorm.rank === 3 ? '#CD7F32' : '#CCC';
  const rankBg = dorm.rank <= 3 ? rankColor + '22' : '#F5F5F5';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', padding: '12px 16px',
      borderBottom: isLast ? 'none' : '1px solid #F5F5F5',
      background: dorm.isYours ? CARDINAL_LIGHT : '#fff',
      transition: 'background 0.2s',
    }}>
      {/* Rank badge */}
      <div style={{
        width: 32, height: 32, borderRadius: 10, background: rankBg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        marginRight: 12, flexShrink: 0,
      }}>
        <span style={{ fontSize: 14, fontWeight: 800, color: dorm.rank <= 3 ? rankColor : '#BBB' }}>
          {dorm.rank}
        </span>
      </div>

      {/* Dorm name */}
      <div style={{ flex: 1 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ fontSize: 15, fontWeight: dorm.isYours ? 700 : 500, color: dorm.isYours ? CARDINAL : '#1A1A1A' }}>
            {dorm.dorm}
          </span>
          {dorm.isYours && (
            <span style={{
              fontSize: 10, fontWeight: 700, color: CARDINAL,
              background: CARDINAL_LIGHT, border: `1px solid ${CARDINAL}33`,
              borderRadius: 6, padding: '1px 5px', textTransform: 'uppercase', letterSpacing: 0.3,
            }}>You</span>
          )}
        </div>
        <span style={{ fontSize: 12, color: '#AAA', fontWeight: 400 }}>{dorm.games} games attended</span>
      </div>

      {/* Change indicator */}
      <div style={{ marginRight: 10 }}>
        {dorm.change === 'up' && <span style={{ fontSize: 12, color: '#22C55E' }}>▲</span>}
        {dorm.change === 'down' && <span style={{ fontSize: 12, color: '#EF4444' }}>▼</span>}
        {dorm.change === 'same' && <span style={{ fontSize: 12, color: '#BBB' }}>—</span>}
      </div>

      {/* Points */}
      <div style={{ textAlign: 'right' }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: '#1A1A1A' }}>{dorm.points.toLocaleString()}</div>
        <div style={{ fontSize: 11, color: '#BBB', fontWeight: 400 }}>pts</div>
      </div>
    </div>
  );
}

function BadgeCard({ badge }) {
  return (
    <div style={{
      background: badge.earned ? '#fff' : '#F8F8F8',
      borderRadius: 14, padding: '12px 8px', textAlign: 'center',
      boxShadow: badge.earned ? '0 1px 6px rgba(0,0,0,0.08)' : 'none',
      border: badge.earned ? `1.5px solid ${CARDINAL}22` : '1.5px solid #EFEFEF',
      opacity: badge.earned ? 1 : 0.55,
      position: 'relative', overflow: 'hidden',
    }}>
      {badge.earned && (
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: 3,
          background: `linear-gradient(90deg, ${CARDINAL}, #E85555)`,
        }} />
      )}
      <div style={{ fontSize: 26, marginBottom: 4, filter: badge.earned ? 'none' : 'grayscale(1)' }}>
        {badge.emoji}
      </div>
      <div style={{ fontSize: 11, fontWeight: 700, color: badge.earned ? '#1A1A1A' : '#999', lineHeight: '14px' }}>
        {badge.name}
      </div>
      {!badge.earned && (
        <div style={{ fontSize: 10, color: '#BBB', marginTop: 2 }}>🔒 Locked</div>
      )}
    </div>
  );
}

// ── Avatar bubble ─────────────────────────────────────────────
function Avatar({ person, size = 28, style = {} }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: person.color,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.36, fontWeight: 700, color: '#fff',
      border: '2px solid #fff',
      flexShrink: 0,
      ...style,
    }}>
      {person.initials}
    </div>
  );
}

// ── Stacked avatar row ────────────────────────────────────────
function AvatarStack({ attendees, max = 5, size = 28 }) {
  const visible = attendees.slice(0, max);
  const overflow = attendees.length - max;
  return (
    <div style={{ display: 'flex', alignItems: 'center' }}>
      {visible.map((p, i) => (
        <div key={i} style={{ marginLeft: i === 0 ? 0 : -(size * 0.35) }}>
          <Avatar person={p} size={size} />
        </div>
      ))}
      {overflow > 0 && (
        <div style={{
          width: size, height: size, borderRadius: '50%',
          background: '#E8E8E8', border: '2px solid #fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: size * 0.32, fontWeight: 700, color: '#888',
          marginLeft: -(size * 0.35),
          flexShrink: 0,
        }}>
          +{overflow}
        </div>
      )}
    </div>
  );
}

  const [expanded, setExpanded] = React.useState(false);
  const allAttendees = isGoing
    ? [{ name: 'You', dorm: '', color: CARDINAL, initials: (userName || 'Me').trim().slice(0, 2).toUpperCase() }, ...attendees]
    : attendees;
  const previewCount = 3;
  const shown = expanded ? allAttendees : allAttendees.slice(0, previewCount);

  if (allAttendees.length === 0) return null;

  return (
    <div style={{
      borderTop: '1px solid #F0F0F0', paddingTop: 12, marginTop: 4,
    }}>
      {/* Header row */}
      <button
        onClick={() => setExpanded(v => !v)}
        style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          width: '100%', background: 'none', border: 'none', cursor: 'pointer',
          padding: 0, marginBottom: expanded ? 10 : 8,
        }}
      >
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <AvatarStack attendees={allAttendees} max={5} size={26} />
          <span style={{ fontSize: 13, fontWeight: 600, color: '#444' }}>
            {allAttendees.length} {allAttendees.length === 1 ? 'person' : 'people'} going
          </span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ fontSize: 12, color: '#AAA' }}>{expanded ? 'less' : 'see all'}</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
            style={{ transform: expanded ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}>
            <path d="M6 9l6 6 6-6" stroke="#BBB" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </button>

      {/* Name list */}
      {expanded && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 4 }}>
          {allAttendees.map((p, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '5px 8px', borderRadius: 10,
              background: p.name === 'You' ? CARDINAL_LIGHT : '#FAFAFA',
              border: p.name === 'You' ? `1px solid ${CARDINAL}22` : '1px solid transparent',
            }}>
              <Avatar person={p} size={30} />
              <div style={{ flex: 1 }}>
                <span style={{
                  fontSize: 13, fontWeight: p.name === 'You' ? 700 : 500,
                  color: p.name === 'You' ? CARDINAL : '#1A1A1A',
                }}>{p.name}</span>
                {p.dorm && (
                  <span style={{ fontSize: 11, color: '#AAA', marginLeft: 5 }}>{p.dorm}</span>
                )}
              </div>
              {p.name === 'You' && (
                <span style={{
                  fontSize: 10, fontWeight: 700, color: CARDINAL,
                  background: CARDINAL_LIGHT, border: `1px solid ${CARDINAL}33`,
                  borderRadius: 6, padding: '1px 6px',
                }}>YOU</span>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Collapsed: show first few names inline */}
      {!expanded && (
        <p style={{ fontSize: 12, color: '#888', lineHeight: '16px' }}>
          {isGoing && <span style={{ color: CARDINAL, fontWeight: 600 }}>You</span>}
          {isGoing && allAttendees.length > 1 && ', '}
          {allAttendees
            .filter(p => p.name !== 'You')
            .slice(0, isGoing ? 2 : 3)
            .map(p => p.name)
            .join(', ')}
          {allAttendees.length > previewCount && ` +${allAttendees.length - previewCount} more`}
          {' are going'}
        </p>
      )}
    </div>
  );
}

// ── Screen: Upcoming Games ────────────────────────────────────
function GamesScreen({ tweaks }) {
  const { totalPoints, userName } = tweaks;
  const [going, setGoing] = React.useState({});
  const [pts, setPts] = React.useState(totalPoints);
  const [bouncing, setBouncing] = React.useState(null);
  // Track attendees per game (mutable copy)
  const [attendees, setAttendees] = React.useState(
    Object.fromEntries(Object.entries(ATTENDEES_SEED).map(([k, v]) => [k, [...v]]))
  );

  const handleGoing = (game) => {
    if (going[game.id]) return;
    setGoing(prev => ({ ...prev, [game.id]: true }));
    setPts(prev => prev + game.points);
    setBouncing(game.id);
    setTimeout(() => setBouncing(null), 700);
  };

  return (
    <div style={{ height: '100%', overflowY: 'auto', paddingBottom: 90, background: '#FAFAFA' }}>
      {/* Header */}
      <div style={{
        background: CARDINAL, paddingTop: 58, paddingBottom: 20, paddingLeft: 20, paddingRight: 20,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <p style={{ color: '#fff', fontSize: 22, fontWeight: 800, letterSpacing: -0.5 }}>Upcoming Games</p>
            <p style={{ color: 'rgba(255,255,255,0.65)', fontSize: 13, marginTop: 2 }}>Tap "I'm Going" to claim points</p>
          </div>
          <div style={{
            background: 'rgba(255,255,255,0.15)', borderRadius: 12,
            padding: '8px 12px', textAlign: 'center',
            border: '1px solid rgba(255,255,255,0.25)',
            transition: 'transform 0.15s',
            transform: bouncing ? 'scale(1.12)' : 'scale(1)',
          }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: '#FFD700' }}>{pts.toLocaleString()}</div>
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.65)', fontWeight: 500 }}>MY POINTS</div>
          </div>
        </div>
      </div>

      {/* Game cards */}
      <div style={{ padding: '12px 12px 0', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {UPCOMING_GAMES.map(game => (
          <GameCard
            key={game.id}
            game={game}
            isGoing={!!going[game.id]}
            onGoing={() => handleGoing(game)}
            attendees={attendees[game.id] || []}
            userName={userName}
          />
        ))}
      </div>

      {/* Info note */}
      <div style={{ padding: '14px 12px' }}>
        <div style={{
          background: '#fff', borderRadius: 12, padding: '12px 14px',
          display: 'flex', gap: 10, alignItems: 'flex-start',
          border: '1px solid #F0F0F0',
        }}>
          <span style={{ fontSize: 16 }}>ℹ️</span>
          <p style={{ fontSize: 12, color: '#888', lineHeight: '17px' }}>
            Points are awarded after attendance is verified at the gate. Bring your Stanford ID to every event.
          </p>
        </div>
      </div>
    </div>
  );
}

function GameCard({ game, isGoing, onGoing, attendees, userName }) {
  return (
    <div style={{
      background: '#fff', borderRadius: 16,
      boxShadow: isGoing ? `0 2px 16px ${game.color}33` : '0 1px 8px rgba(0,0,0,0.06)',
      overflow: 'hidden',
      border: isGoing ? `1.5px solid ${game.color}55` : '1.5px solid transparent',
      transition: 'box-shadow 0.3s, border 0.3s',
    }}>
      {/* Sport color stripe */}
      <div style={{ height: 4, background: `linear-gradient(90deg, ${game.color}, ${game.color}88)` }} />
      <div style={{ padding: '14px 16px' }}>

        {/* Header: sport + points badge */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 20 }}>{game.icon}</span>
            <div>
              <p style={{ fontSize: 15, fontWeight: 700, color: '#1A1A1A' }}>{game.sport}</p>
              <p style={{ fontSize: 13, color: '#666', fontWeight: 500 }}>{game.opponent}</p>
            </div>
          </div>
          <div style={{
            background: isGoing ? game.color : '#F5F5F5',
            borderRadius: 10, padding: '4px 10px',
            transition: 'background 0.3s',
          }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: isGoing ? '#fff' : '#999' }}>
              +{game.points} pts
            </span>
          </div>
        </div>

        {/* Date / time / venue */}
        <div style={{ display: 'flex', gap: 14, marginBottom: 6 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="3" stroke="#BBB" strokeWidth="2"/>
              <path d="M3 9h18" stroke="#BBB" strokeWidth="2"/>
              <path d="M8 2v4M16 2v4" stroke="#BBB" strokeWidth="2" strokeLinecap="round"/>
            </svg>
            <span style={{ fontSize: 12, color: '#888' }}>{game.date}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="#BBB" strokeWidth="2"/>
              <path d="M12 7v5l3 3" stroke="#BBB" strokeWidth="2" strokeLinecap="round"/>
            </svg>
            <span style={{ fontSize: 12, color: '#888' }}>{game.time}</span>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 12 }}>
          <svg width="12" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="#BBB" strokeWidth="2"/>
            <circle cx="12" cy="9" r="2.5" stroke="#BBB" strokeWidth="2"/>
          </svg>
          <span style={{ fontSize: 12, color: '#888' }}>{game.venue}</span>
        </div>

        {/* ── Partiful-style attendee section ── */}
        <AttendeeDrawer
          attendees={attendees}
          userName={userName}
          isGoing={isGoing}
          gameColor={game.color}
        />

        {/* CTA Button */}
        <button
          onClick={onGoing}
          style={{
            width: '100%', padding: '13px',
            marginTop: 12,
            background: isGoing
              ? `linear-gradient(135deg, #22C55E, #16A34A)`
              : `linear-gradient(135deg, ${CARDINAL}, ${CARDINAL_DARK})`,
            color: '#fff', borderRadius: 12, border: 'none',
            fontSize: 15, fontWeight: 700, cursor: isGoing ? 'default' : 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            transition: 'background 0.3s',
            boxShadow: isGoing ? '0 4px 12px rgba(34,197,94,0.35)' : `0 4px 12px ${CARDINAL}44`,
          }}
        >
          {isGoing ? (
            <>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M5 12l5 5L19 7" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              You're Going!
            </>
          ) : (
            <>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/>
              </svg>
              I'm Going
            </>
          )}
        </button>
      </div>
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = React.useState('home');
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);

  // Tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, value) => {
    const updates = typeof key === 'object' ? key : { [key]: value };
    setTweaks(prev => ({ ...prev, ...updates }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: updates }, '*');
  };

  const screens = { home: HomeScreen, games: GamesScreen, profile: ProfileScreen };
  const Screen = screens[activeTab];

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', padding: 20 }}>
      <IOSDevice width={390} height={844}>
        <div style={{ position: 'relative', height: '100%', overflow: 'hidden' }}>
          <Screen tweaks={tweaks} />
          <BottomNav active={activeTab} setActive={setActiveTab} />
        </div>
      </IOSDevice>

      {/* Tweaks Panel */}
      {showTweaks && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
          background: '#fff', borderRadius: 20,
          boxShadow: '0 8px 40px rgba(0,0,0,0.18)',
          padding: '20px', width: 280,
          border: '1px solid rgba(0,0,0,0.08)',
          fontFamily: 'Inter, sans-serif',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <span style={{ fontWeight: 700, fontSize: 15, color: '#1A1A1A' }}>Tweaks</span>
            <button onClick={() => {
              setShowTweaks(false);
              window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
            }} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: '#999' }}>✕</button>
          </div>

          {[
            { label: 'Dorm Name', key: 'dormName', type: 'text' },
            { label: 'Dorm Rank', key: 'dormRank', type: 'number', min: 1, max: 8 },
            { label: 'Your Name', key: 'userName', type: 'text' },
            { label: 'Games Attended', key: 'gamesAttended', type: 'number', min: 0, max: 50 },
            { label: 'Streak (games)', key: 'currentStreak', type: 'number', min: 0, max: 20 },
            { label: 'Total Points', key: 'totalPoints', type: 'number', min: 0, max: 9999 },
          ].map(field => (
            <div key={field.key} style={{ marginBottom: 12 }}>
              <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: '#888', marginBottom: 4, textTransform: 'uppercase', letterSpacing: 0.4 }}>
                {field.label}
              </label>
              <input
                type={field.type}
                min={field.min}
                max={field.max}
                value={tweaks[field.key]}
                onChange={e => setTweak(field.key, field.type === 'number' ? Number(e.target.value) : e.target.value)}
                style={{
                  width: '100%', padding: '8px 10px', borderRadius: 8,
                  border: '1.5px solid #EEE', fontSize: 14, color: '#1A1A1A',
                  fontFamily: 'Inter, sans-serif', outline: 'none',
                }}
              />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
